# DBIP Staging Configuration
environment: staging
debug: false

server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 2

database:
  postgres:
    host: staging-postgres.dbip.local
    port: 5432
    user: dbip
    password: ${POSTGRES_PASSWORD}
    database: dbip_staging
  redis:
    host: staging-redis.dbip.local
    port: 6379
  neo4j:
    uri: bolt://staging-neo4j.dbip.local:7687
    user: neo4j
    password: ${NEO4J_PASSWORD}

pipeline:
  fusion_threshold: 0.80
  identity_similarity_threshold: 0.90
  default_confidence: 0.5

logging:
  level: INFO

features:
  mdips_compliance: true
  multi_dimensional_confidence: true
  identity_resolution: true
  evidence_assessment: true
  knowledge_graph: true
  search_intelligence: true
  observability: true